<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/crud.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <!--Header-->  
    <header>
        <div class="middle-text">
            <h1>SusanaTiendaBogotá</h1>
        </div>
        <!-- 🔑 Botón de cerrar sesión -->
        <button id="logout-btn" class="btn">Cerrar Sesión</button>
    </header>

    <!--Formulario para agregar productos-->
    <section id="gestion-productos">
        <div class="middle-text">
            <h2>Gestión de Productos</h2>
            <h3>Agregar Nuevo Producto</h3>
        </div>

        <div class="form-container">
            <form id="producto-form">
                <input type="hidden" id="producto-id"> <!-- Para editar productos -->

                <label for="nombre">Nombre del Producto:</label>
                <input type="text" id="nombre" required>

                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" required></textarea>

                <label for="precio">Precio:</label>
                <input type="number" id="precio" required>

                <label for="imagen">Imagen:</label>
                <input type="file" id="imagen" accept="image/*" required>

                <button type="submit" class="btn">Guardar Producto</button>
            </form>
        </div>
    </section>

    <!--Lista de productos-->
    <section id="lista-productos">
        <div class="middle-text">
            <h3>Lista de Productos</h3>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Imagen</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="productos-lista"></tbody>
        </table>
    </section>

    <!--Botón para volver al catálogo-->
    <div class="btn-container">
        <a href="catalogo.html" class="btn">Volver al catálogo <i class="bx bxs-right-arrow"></i></a>
    </div>

    <!-- 🔑 Protección de acceso y Logout -->
    <script>
        const usuario = JSON.parse(localStorage.getItem("usuario"));

        if (!usuario) {
            alert("⚠️ Debes iniciar sesión primero.");
            window.location.href = "login.html";
        } else if (usuario.rol !== "admin") {
            alert("⚠️ No tienes permisos para acceder a esta página.");
            window.location.href = "catalogo.html";
        }

        // Botón de logout
        document.getElementById("logout-btn").addEventListener("click", () => {
            localStorage.removeItem("usuario");
            alert("👋 Sesión cerrada");
            window.location.href = "login.html";
        });
    </script>

    <script src="js/crud.js"></script>
</body>
</html>
